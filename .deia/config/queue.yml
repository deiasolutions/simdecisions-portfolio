budget:
  # DO NOT CHANGE WITHOUT HUMAN APPROVAL
  cap_budget: false
  max_session_usd: 0
  warn_threshold: 0.80
  max_fix_cycles_per_spec: 2
  max_specs_per_session: 50
  max_parallel_bees: 20
  min_parallel_bees: 5

ttl:
  # Time-to-live for BUILDING specs (stall detection)
  building_ttl_seconds: 600  # 10 minutes
  scan_interval_seconds: 60  # Scan every minute

bundling:
  # Bundle formation with context window guard (PRISM-IR v1.1 Section 5.1-5.2)
  max_bundle_tokens: 100000       # Maximum tokens per bundle
  token_buffer_ratio: 0.8         # Use 80% of operator's context window

models:
  regent_bot: "sonnet"
  q33n: "claude-sonnet-4-6"
  bee_default: "claude-haiku-4-5"
  bee_complex: "claude-sonnet-4-6"

paths:
  queue_dir: ".deia/hive/queue"
  needs_review_dir: ".deia/hive/queue/_needs_review"
  done_dir: ".deia/hive/queue/_done"
  smoke_dir: ".deia/hive/smoke"
  coordination_dir: ".deia/hive/coordination"
  tasks_dir: ".deia/hive/tasks"
  responses_dir: ".deia/hive/responses"

deploy:
  railway_health_url: "https://dev-api.shiftcenter.com/health"
  vercel_url: "https://dev.shiftcenter.com"
  health_poll_interval_seconds: 15
  health_poll_timeout_seconds: 300

verification:
  enabled: true
  test_timeout_seconds: 300

git:
  branch: "dev"
  commit_prefix: "[Q33N]"
  auto_push: true

mcp:
  # Graceful degradation control - if MCP server is unavailable, queue proceeds
  # MCP complements dispatch; it never blocks it.
  required: false
