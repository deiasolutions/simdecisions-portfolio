    input_per_million: 15.00
    output_per_million: 75.00
    max_context_tokens: 200000
    batch_preference: NONE
  claude-sonnet-4-5-20250929:
    input_per_million: 3.00
    output_per_million: 15.00
    max_context_tokens: 200000
    batch_preference: PREFERRED
